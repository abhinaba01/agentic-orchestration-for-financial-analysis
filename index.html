<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Analyst — Financial Orchestration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F4F4F2; color: #1A1A1A; font-family: 'Inter', sans-serif; transition: opacity 0.5s ease; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .divider { border-top: 1px solid rgba(26, 26, 26, 0.1); }
        .processing { animation: pulse 1.5s infinite; opacity: 0.6; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .chain-of-thought { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 1.5rem; font-size: 0.9rem; margin-top: 1rem; }
    </style>
</head>
<body class="p-8 md:p-20">

    <header class="mb-20">
        <p class="text-xs tracking-widest uppercase mb-4 opacity-50">Financial Intelligence</p>
        <h1 class="text-6xl md:text-8xl font-light tracking-tight">The Analyst</h1>
        <div class="divider mt-12"></div>
    </header>

    <main class="max-w-5xl mx-auto">
        <section id="ingestion-zone" class="mb-16">
            <label class="group cursor-pointer">
                <span class="text-2xl hover:italic transition-all">Upload Document —</span>
                <input type="file" id="file-input" class="hidden" onchange="uploadFile(this)">
            </label>
            <div id="status-text" class="mt-4 text-sm opacity-50 italic hidden"></div>
        </section>

        <section id="dashboard" class="hidden space-y-16 fade-in">
            <div class="max-w-3xl">
                <h2 class="text-4xl mb-6">Executive Summary</h2>
                <p id="summary" class="text-xl leading-relaxed opacity-80 italic"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div>
                    <h3 class="uppercase text-xs tracking-widest mb-6 opacity-50">Key Metrics</h3>
                    <div id="kpi-list" class="space-y-4 text-lg"></div>
                </div>
                <div>
                    <h3 class="uppercase text-xs tracking-widest mb-6 opacity-50">Analysis</h3>
                    <p class="text-sm mb-2">Company: <span id="company-name" class="font-semibold"></span></p>
                    <p class="text-sm">Sentiment: <span id="sentiment" class="font-semibold"></span></p>
                </div>
            </div>

            <div class="divider"></div>

            <section id="qa-section">
                <h2 class="text-4xl mb-8">Ask the Document</h2>
                <input type="text" id="query-input" placeholder="Query data..." 
                       class="w-full bg-transparent text-2xl border-b border-black/10 outline-none pb-4 placeholder:opacity-20 italic">
                <div id="qa-responses" class="mt-12 space-y-10"></div>
            </section>
        </section>
    </main>

    <script>
        // Use the explicit local IPv4 address to avoid connection issues
        const API_BASE = 'http://127.0.0.1:8000/api';

        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;

            // 1. ERASE PREVIOUS UI CONTENT IMMEDIATELY
            document.getElementById('summary').textContent = "";
            document.getElementById('company-name').textContent = "";
            document.getElementById('sentiment').textContent = "";
            document.getElementById('kpi-list').innerHTML = "";
            document.getElementById('qa-responses').innerHTML = ""; // Clears all previous Q&A
            document.getElementById('query-input').value = "";

            // Hide dashboard until new processing is complete
            document.getElementById('dashboard').classList.add('hidden');

            const status = document.getElementById('status-text');
            status.textContent = "Initializing analysis...";
            status.classList.remove('hidden');

            // 2. TRIGGER BACKEND PROCESS
            const formData = new FormData();
            formData.append('file', file);

        
        

      

            try {
                const response = await fetch(`${API_BASE}/process`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Backend connection failed.");

                const data = await response.json();
                
                // Populate Dashboard
                document.getElementById('summary').textContent = data.summary;
                document.getElementById('company-name').textContent = data.company_name;
                document.getElementById('sentiment').textContent = data.overall_sentiment;
                
                const kpiList = document.getElementById('kpi-list');
                kpiList.innerHTML = '';
                for (const [key, val] of Object.entries(data.kpis)) {
                    kpiList.innerHTML += `<div class="flex justify-between border-b border-black/5 pb-2">
                        <span class="opacity-60">${key}</span>
                        <span>${val}</span>
                    </div>`;
                }

                document.getElementById('dashboard').classList.remove('hidden');
                status.classList.add('hidden');
                
                // Set up Q&A listener
                document.getElementById('query-input').addEventListener('keypress', handleQuery);
            } catch (err) {
                status.textContent = "Error: Ensure web.py is running on http://127.0.0.1:8000";
                status.classList.remove('processing');
            }
        }

        async function handleQuery(e) {
            if (e.key !== 'Enter') return;
            const query = e.target.value;
            if (!query) return;

            const responseContainer = document.getElementById('qa-responses');
            const thinking = document.createElement('p');
            thinking.className = "italic opacity-50";
            thinking.textContent = "Thinking...";
            responseContainer.prepend(thinking);

            try {
                const res = await fetch(`${API_BASE}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await res.json();
                thinking.remove();

                const answerDiv = document.createElement('div');
                answerDiv.className = "border-l-2 border-black/10 pl-6 py-2 mb-8";
                answerDiv.innerHTML = `
                    <p class="text-sm uppercase tracking-widest opacity-40 mb-2">Query: ${data.query}</p>
                    <p class="text-xl mb-4">${data.answer}</p>
                    <details class="text-xs opacity-60">
                        <summary class="cursor-pointer hover:opacity-100 transition-opacity">View Chain of Thought</summary>
                        <div class="chain-of-thought mt-4 text-gray-700">${data.chain_of_thought}</div>
                    </details>
                `;
                responseContainer.prepend(answerDiv);
                e.target.value = '';
            } catch (err) {
                thinking.textContent = "Error communicating with the RAG Agent.";
            }
        }
    </script>
</body>
</html>
